name: Deploy Flutter Frontend to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java (required by Flutter toolchain)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter (stable channel)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Install dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # 5. Build Flutter Web
      #    BACKEND_URL is stored as a GitHub Secret — never hardcoded in source.
      - name: Build Flutter Web
        run: flutter build web --release --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      # 6. Deploy to Vercel using the official Vercel CLI
      #    Required GitHub Secrets:
      #      VERCEL_TOKEN      — from https://vercel.com/account/tokens
      #      VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
      #      VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
      - name: Deploy to Vercel
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./build/web
